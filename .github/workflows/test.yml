name: Test
on:
  workflow_dispatch

defaults:
  run:
    shell: pwsh

jobs:
  say-hello:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'microsoft'
      
      - name: Set up .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Set up C++ Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build
      
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
      
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true
      
      - name: Install yq
        uses: dcarbone/install-yq-action@v1.3.1
      
      - name: Verify Environments
        run: |
          echo "Checking Java..." && java -version
          echo "Checking .NET..." && dotnet --version
          echo "Checking Rust..." && rustc --version
          echo "Checking C++..." && g++ --version && cmake --version
          echo "Checking Flutter..." && flutter --version
          echo "Checking Android SDK..." && adb version
          echo "Checking yq..." && yq '.version' pubspec.yaml
